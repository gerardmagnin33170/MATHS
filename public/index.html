<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressivité IA - Outil de planification (Escalier Natif)</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <header>
        <h1>Progressivité IA - Élèves</h1>
        <div class="sous-titre">Outil d'explicitation d'une progressivité des compétences</div>
    </header>

    <div class="barre-outils">
        <button onclick="reinitialiser()">Réinitialiser tout</button>
        <button id="btn-print-tableau" class="btn-print hidden" onclick="imprimerTableau()">🖨️ Imprimer en Tableau</button>
    </div>

    <main>
        <div id="zone-vignettes-wrapper" class="zone-banque">
            <div class="titre-section">
                <span>Banque de compétences à classer</span>
            </div>
            <div id="zone-banque" ondragover="autoriserDepot(event)" ondrop="deposerDansBanque(event)"></div>
        </div>

        <div class="tabs-container">
            <div class="tabs-header">
                <button class="tab-button savoir active" onclick="switchTab('savoir')">
                    💡 Savoir comment fonctionnent les IA
                </button>
                <button class="tab-button enjeux" onclick="switchTab('enjeux')">
                    🛡️ Identifier les enjeux des IA
                </button>
                <button class="tab-button apprendre" onclick="switchTab('apprendre')">
                    🚀 Apprendre avec les IA
                </button>
                 <button class="tab-button synthese" onclick="switchTab('synthese')">
                    📋 Synthèse (Tableau)
                </button>
            </div>

            <div class="tabs-content">
                <div id="tab-savoir" class="tab-pane savoir active">
                    <div class="stair-container" id="stair-savoir"></div>
                </div>

                <div id="tab-enjeux" class="tab-pane enjeux">
                    <div class="stair-container" id="stair-enjeux"></div>
                </div>

                <div id="tab-apprendre" class="tab-pane apprendre">
                    <div class="stair-container" id="stair-apprendre"></div>
                </div>
                 <div id="tab-synthese" class="tab-pane synthese">
                    </div>
            </div>
        </div>
    </main>

    <footer>
        <p>Auteur : Toi&Moi | Licence : <a href="https://www.gnu.org/licenses/gpl-3.0.html">GPL v3</a></p>
    </footer>

    <div id="tableau-impression"></div>

    <script src="scripts/js-yaml.min.js"></script>
    <script src="scripts/main.js"></script>
</body>
</html>
